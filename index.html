<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description"
        content="Innocent Gangsters – the official crew page. Click to find out who we really are." />
    <title>Innocent Gangsters 🔥</title>

    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />

    <!-- Stylesheets (order matters) -->
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/cards.css" />
    <link rel="stylesheet" href="css/profile.css" />

    <!-- Favicon emoji -->
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>" />
</head>

<body>

    <!-- Particle Canvas -->
    <canvas id="bg-canvas" aria-hidden="true"></canvas>

    <div class="site-wrapper">

        <!-- ── Hero ──────────────────────────────────── -->
        <header class="hero">
            <div class="hero-eyebrow">Est. Always • Lahore Division</div>

            <h1 class="hero-title">
                <span class="glitch" data-text="INNOCENT">INNOCENT</span>
                <br />
                <span class="glitch" data-text="GANGSTERS">GANGSTERS</span>
            </h1>

            <p class="hero-subtitle">
                Too innocent to be guilty. Too guilty to be innocent.
            </p>

            <div class="hero-divider">
                <span></span>
                <em>🤝</em>
                <span></span>
            </div>

            <div class="gang-stats">
                <div class="gang-stat">
                    <div class="gang-stat-num" id="gang-count">0</div>
                    <div class="gang-stat-label">Members</div>
                </div>
                <div class="gang-stat">
                    <div class="gang-stat-num">∞</div>
                    <div class="gang-stat-label">Chai Sessions</div>
                </div>
                <div class="gang-stat">
                    <div class="gang-stat-num">0</div>
                    <div class="gang-stat-label">Regrets</div>
                </div>
            </div>
        </header>

        <!-- ── Cards Grid ─────────────────────────────── -->
        <main>
            <p class="section-label">— click a member to see their file —</p>
            <div class="cards-grid" id="cards-grid">
                <!-- Cards injected by app.js from data.js -->
            </div>
        </main>

        <!-- ── Footer ─────────────────────────────────── -->
        <footer class="footer">
            <p>Made with ❤️ by <strong>Muhammad Usman</strong> &nbsp;·&nbsp; <strong>Innocent Gangsters</strong> © 2025
            </p>
        </footer>

    </div><!-- end site-wrapper -->


    <!-- ══ Profile Modal ═══════════════════════════════ -->
    <div id="profile-overlay" class="profile-overlay" role="dialog" aria-modal="true">
        <div id="profile-sheet" class="profile-sheet">
            <!-- Content injected by profile.js when a card is clicked -->
        </div>
    </div>


    <!-- ══ Photo Lightbox ══════════════════════════════ -->
    <div id="lightbox" class="lightbox" role="dialog" aria-modal="true">

        <button id="lightbox-close" class="lightbox-close" aria-label="Close photo">✕</button>

        <button id="lightbox-prev" aria-label="Previous photo" style="
      position:absolute; left:20px; top:50%; transform:translateY(-50%);
      width:44px; height:44px; border-radius:50%;
      background:rgba(255,255,255,0.1); border:none;
      color:white; font-size:1.4rem; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      transition:background 0.2s;">‹</button>

        <img id="lightbox-img" src="" alt="Full size photo" />

        <button id="lightbox-next" aria-label="Next photo" style="
      position:absolute; right:20px; top:50%; transform:translateY(-50%);
      width:44px; height:44px; border-radius:50%;
      background:rgba(255,255,255,0.1); border:none;
      color:white; font-size:1.4rem; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      transition:background 0.2s;">›</button>

    </div>


    <!-- ══ Scripts (order matters) ═════════════════════ -->
    <script src="js/data.js"></script> <!-- friend data first -->
    <script src="js/profile.js"></script> <!-- modal logic -->
    <script src="js/app.js"></script> <!-- render + particles last -->

</body>

</html>
